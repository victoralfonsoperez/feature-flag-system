name: Deploy on Flag Change

on:
  repository_dispatch:
    types: [flag-changed]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: .nvmrc

      - name: Fetch build-time flags
        run: |
          # Token created via dashboard API Tokens page, stored as repo secret
          curl -sf -H "Authorization: Bearer ${{ secrets.FLAG_SERVICE_API_TOKEN }}" \
            "${{ secrets.FLAG_SERVICE_URL }}/api/flags?type=build-time&env=prod" \
            | jq -r '.[] | "\(.key)=\(.value)"' > .env

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Deploy
        run: |
          echo "Deploy step — configure for your hosting platform"
          # e.g., aws s3 sync, vercel deploy, rsync, etc.
